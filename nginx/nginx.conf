# /etc/nginx/sites-available/predictio

server {
    listen 80;
    server_name predictio.live www.predictio.live api.predictio.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.predictio.live;

    ssl_certificate /etc/letsencrypt/live/predictio.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/predictio.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001/api/v1/health;
        access_log off;
    }

    add_header Access-Control-Allow-Origin "https://predictio.live" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Predictio-Key" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
}
